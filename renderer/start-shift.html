<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EL-TARZY — بدء الشيفت</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/global.css" />
  <style>
    body {
      background: linear-gradient(135deg, #0F1729 0%, #1B2A4A 40%, #243560 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .bg-circle {
      position: fixed; border-radius: 50%; opacity: 0.06; pointer-events: none;
    }
    .bg-circle-1 { width: 500px; height: 500px; background: var(--success); top: -150px; left: -100px; }
    .bg-circle-2 { width: 350px; height: 350px; background: var(--accent); bottom: -80px; right: -60px; }

    .shift-container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }

    .shift-header {
      text-align: center;
      color: #fff;
    }

    .shift-header-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--success), #24875a);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 16px;
      box-shadow: 0 8px 32px rgba(45,158,107,0.35);
    }

    .shift-header h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .shift-header p {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
    }

    .shift-card {
      background: rgba(255,255,255,0.97);
      border-radius: 20px;
      padding: 32px;
      width: 420px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    }

    .shift-user-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--accent-light);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 24px;
    }

    .shift-user-avatar {
      width: 44px;
      height: 44px;
      background: var(--accent);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
    }

    .shift-user-info h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .shift-user-info p {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .shift-field {
      margin-bottom: 20px;
    }

    .shift-field label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .shift-field-hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      font-weight: 400;
    }

    .shift-input {
      width: 100%;
      height: 52px;
      padding: 0 18px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-family: var(--font);
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      text-align: center;
      transition: all 0.2s ease;
    }

    .shift-input:focus {
      outline: none;
      border-color: var(--success);
      box-shadow: 0 0 0 4px rgba(45,158,107,0.15);
    }

    .shift-btn {
      width: 100%;
      height: 50px;
      background: linear-gradient(135deg, var(--success), #24875a);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .shift-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(45,158,107,0.4);
    }

    .shift-btn:active { transform: translateY(0); }

    .shift-back-link {
      text-align: center;
      margin-top: 8px;
    }

    .shift-back-link a {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .shift-back-link a:hover { color: rgba(255,255,255,0.8); }

    .shift-time {
      text-align: center;
      color: rgba(255,255,255,0.3);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }
    
    /* Receipt Print */
    .receipt-print { display: none; }
    @media print {
      body { background: #fff !important; padding: 0 !important; }
      body > *:not(.receipt-print) { display: none !important; }
      .receipt-print { display: block !important; }
    }
  </style>
</head>
<body>

<div class="bg-circle bg-circle-1"></div>
<div class="bg-circle bg-circle-2"></div>

<div class="shift-container">

  <div class="shift-header">
    <div class="shift-header-icon">⏱</div>
    <h1>بدء الشيفت</h1>
    <p>سجّل العهدة الافتتاحية قبل البدء</p>
  </div>

  <div class="shift-card">
    <!-- User info -->
    <div class="shift-user-badge">
      <div class="shift-user-avatar" id="userAvatar">م</div>
      <div class="shift-user-info">
        <h3 id="userName">الكاشير</h3>
        <p id="userRole">كاشير</p>
      </div>
    </div>

    <!-- Opening cash field -->
    <div class="shift-field">
      <label>
        العهدة الافتتاحية (جنيه)
      </label>
      <input type="number" class="shift-input" id="openingCash"
             placeholder="0" value="0" min="0" step="0.01" autofocus />
      <div class="shift-field-hint">
        أدخل المبلغ النقدي المُسلَّم لك في بداية الشيفت
      </div>
    </div>

    <button class="shift-btn" id="startBtn" onclick="startShift()">
      ▶ بدء الشيفت
    </button>
  </div>

  <div class="shift-back-link">
    <a onclick="goBack()">↩ تسجيل خروج والعودة لشاشة الدخول</a>
  </div>

  <div class="shift-time" id="clockDisplay"></div>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- Print Container -->
<div class="receipt-print" id="receiptPrint"></div>

<script>
// ─── Load user info ──────────────────────────────────────────────────────────
async function loadUser() {
  const res = await window.auth.getSession();
  if (!res.success) {
    // Not logged in — redirect to login
    window.electron.navigate('login.html');
    return;
  }
  const user = res.data;
  document.getElementById('userName').textContent = user.employeeName || user.username;
  document.getElementById('userRole').textContent = user.role === 'admin' ? 'مدير النظام' : 'كاشير';
  document.getElementById('userAvatar').textContent = (user.employeeName || user.username).charAt(0);

  // Update sessionStorage
  sessionStorage.setItem('elTarzy_userId', user.userId);
  sessionStorage.setItem('elTarzy_employeeId', user.employeeId);
  sessionStorage.setItem('elTarzy_employeeName', user.employeeName);
  sessionStorage.setItem('elTarzy_username', user.username);
  sessionStorage.setItem('elTarzy_role', user.role);
}

// ─── Start shift ──────────────────────────────────────────────────────────────
async function startShift() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;

  const openingCash = parseFloat(document.getElementById('openingCash').value) || 0;

  try {
    const result = await window.shift.start(openingCash);

    if (!result.success) {
      showToast(result.error || 'حدث خطأ', 'error');
      btn.disabled = false;
      return;
    }

    sessionStorage.setItem('elTarzy_shiftId', result.data.shiftId);

    if (result.data.alreadyOpen) {
      showToast('يوجد شيفت مفتوح بالفعل — تم الاستمرار', 'info');
    } else {
      showToast('تم بدء الشيفت بنجاح ', 'success');
      
      const userName = document.getElementById('userName').textContent;
      const receiptHTML = `
        <div style="width:80mm;font-family:'Cairo',monospace;font-size:12px;color:#000;direction:rtl;padding:4mm;">
          <div style="text-align:center;font-size:18px;font-weight:900;margin-bottom:4px;">بدء شيفت جديد</div>
          <div style="border-top:1px dashed #000;margin:5px 0;"></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span>رقم الشيفت:</span><span>${result.data.shiftId}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:3px;"><span>الكاشير:</span><span>${userName}</span></div>
          <div style="display:flex;justify-content:space-between;margin-bottom:3px;font-weight:bold;"><span>العهدة الافتتاحية:</span><span>${Number(openingCash).toLocaleString('ar-EG')} جنيه</span></div>
          <div style="border-top:1px dashed #000;margin:5px 0;"></div>
          <div style="text-align:center;font-size:10px;margin-top:10px;">وقت البدء: ${new Date().toLocaleString('ar-EG')}</div>
        </div>
      `;
      document.getElementById('receiptPrint').innerHTML = receiptHTML;
      try { await window.electron.print({ pageSize: { width: 80000, height: 297000 } }); } catch(e){}
    }

    // Navigate to dashboard after short delay
    setTimeout(() => {
      window.electron.navigate('main-dashboard.html');
    }, 1000);

  } catch (err) {
    showToast('حدث خطأ: ' + err.message, 'error');
    btn.disabled = false;
  }
}

// ─── Go back ──────────────────────────────────────────────────────────────────
async function goBack() {
  await window.auth.logout();
  sessionStorage.clear();
  window.electron.navigate('login.html');
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function showToast(message, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.innerHTML = `<span>${type === 'success' ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : type === 'error' ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>'}</span> ${message}`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.animation = 'toastOut 0.3s ease forwards'; setTimeout(() => toast.remove(), 300); }, 3000);
}

// ─── Clock ────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clockDisplay').textContent =
    now.toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) +
    ' — ' + now.toLocaleTimeString('ar-EG');
}
setInterval(updateClock, 1000);
updateClock();

// ─── Enter key ────────────────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') startShift();
});

// ─── Init ──────────────────────────────────────────────────────────────────
loadUser();
// Check if admin is trying to access start-shift
(async () => {
  const role = sessionStorage.getItem('elTarzy_role');
  if (role === 'admin') {
    showToast('بدء الشيفت مخصص للكاشير فقط', 'warning');
    setTimeout(() => window.electron.navigate('main-dashboard.html'), 1500);
  }
})();
</script>
</body>
</html>
